<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nosso Cantinho - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <div class="login-container">
        <div class="login-box">
            <div class="login-logo">
                <span>📖</span>
                <h1>Nosso Cantinho</h1>
                <p>O clube de leitura das amigas</p>
            </div>
            
            <form id="formLogin" onsubmit="executarLogin(event)">
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="seuemail@exemplo.com" required>
                </div>
                
                <div class="form-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" placeholder="••••••••" required>
                </div>

                <div id="mensagemErro" class="msg-erro" style="display: none;"></div>

                <button type="submit" class="btn-login">Entrar no Clube ✨</button>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
